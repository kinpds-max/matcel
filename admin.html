<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매트허브 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#f5f5f0;min-height:100vh;}
.admin-header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px;text-align:center;}
.admin-header h1{color:#fff;font-size:20px;font-weight:700;}
.admin-header span{color:#7eb8da;font-size:12px;}
.container{max-width:600px;margin:0 auto;padding:16px;}

/* 로그인 */
.auth-box{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.auth-box label{font-size:13px;font-weight:600;color:#333;display:block;margin-bottom:6px;}
.auth-box input{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;}
.auth-box input:focus{outline:none;border-color:#2563eb;}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;}
.btn-danger{background:#e74c3c;color:#fff;padding:8px 14px;width:auto;font-size:12px;border-radius:6px;}
.btn-success{background:#27ae60;color:#fff;}

/* 패널 */
.panel{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.panel-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f0f0f0;}
.stat-row{display:flex;gap:12px;margin-bottom:16px;}
.stat-card{flex:1;background:#f8f8f5;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;color:#1a1a2e;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}

/* 추가 폼 */
.add-form{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.add-form input{flex:1;min-width:0;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;}
.add-form input:focus{outline:none;border-color:#2563eb;}
.add-form select{padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:#fff;}
.add-form button{padding:10px 20px;border-radius:8px;border:none;background:#1a1a2e;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}

/* 유저 리스트 */
.user-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #f0f0f0;gap:8px;}
.user-item:last-child{border-bottom:none;}
.user-email{font-size:13px;font-weight:600;color:#333;flex:1;word-break:break-all;}
.user-plan{font-size:11px;padding:3px 8px;border-radius:12px;font-weight:600;white-space:nowrap;}
.plan-monthly{background:#e8f4fd;color:#2563eb;}
.plan-purchase{background:#fdf0ef;color:#e74c3c;}
.user-date{font-size:10px;color:#999;white-space:nowrap;}
.user-actions{display:flex;gap:6px;align-items:center;}

.empty-msg{text-align:center;padding:32px;color:#aaa;font-size:14px;}
.status-msg{padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px;text-align:center;}
.status-success{background:#edfff4;color:#27ae60;}
.status-error{background:#fdf0ef;color:#e74c3c;}
.hidden{display:none!important;}
.logout-link{color:#7eb8da;font-size:12px;cursor:pointer;margin-top:8px;display:inline-block;}
</style>
</head>
<body>

<div class="admin-header">
  <span>MATHUB ADMIN</span>
  <h1>매트허브 관리자 페이지</h1>
</div>

<div class="container">
  <!-- 인증 -->
  <div id="authSection" class="auth-box">
    <label>GitHub Personal Access Token</label>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxx...">
    <label>관리자 비밀번호</label>
    <input type="password" id="pwInput" placeholder="비밀번호 입력">
    <button class="btn btn-primary" onclick="adminLogin()">관리자 로그인</button>
    <div id="authMsg" class="status-msg hidden"></div>
  </div>

  <!-- 대시보드 -->
  <div id="dashboard" class="hidden">
    <div class="panel">
      <div class="panel-title">📊 현황</div>
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">전체 구독자</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statMonthly">0</div>
          <div class="stat-label">월구독</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statPurchase">0</div>
          <div class="stat-label">프로그램구입</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">➕ 구독자 추가</div>
      <div class="add-form">
        <input type="email" id="addEmail" placeholder="이메일 (Google 로그인 이메일)">
        <select id="addPlan">
          <option value="monthly">월구독 3만원</option>
          <option value="purchase">프로그램구입 50만원</option>
        </select>
      </div>
      <button class="btn btn-success" onclick="addUser()" style="margin-bottom:8px;">구독자 추가</button>
      <div id="addMsg" class="status-msg hidden"></div>
    </div>

    <div class="panel">
      <div class="panel-title">👥 구독자 목록</div>
      <div id="userList"></div>
    </div>

    <div style="text-align:center;margin-top:16px;">
      <span class="logout-link" onclick="adminLogout()">로그아웃</span>
    </div>
  </div>
</div>

<script>
var REPO_OWNER = 'kinpds-max';
var REPO_NAME = 'matcel';
var FILE_PATH = 'users.json';
var ADMIN_PW = 'matcel2024!';

var ghToken = '';
var usersData = null;
var fileSha = '';

function adminLogin() {
  var token = document.getElementById('tokenInput').value.trim();
  var pw = document.getElementById('pwInput').value.trim();
  var msg = document.getElementById('authMsg');

  if (pw !== ADMIN_PW) {
    msg.className = 'status-msg status-error'; msg.textContent = '비밀번호가 틀립니다.';
    msg.classList.remove('hidden'); return;
  }
  if (!token.startsWith('ghp_')) {
    msg.className = 'status-msg status-error'; msg.textContent = 'GitHub 토큰을 입력해주세요.';
    msg.classList.remove('hidden'); return;
  }

  ghToken = token;
  msg.className = 'status-msg'; msg.textContent = '로딩 중...';
  msg.classList.remove('hidden');
  loadUsers();
}

function adminLogout() {
  ghToken = '';
  document.getElementById('authSection').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('tokenInput').value = '';
  document.getElementById('pwInput').value = '';
}

async function loadUsers() {
  try {
    var res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + FILE_PATH, {
      headers: { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error('GitHub 접근 실패 (' + res.status + ')');
    var data = await res.json();
    fileSha = data.sha;
    usersData = JSON.parse(atob(data.content.replace(/\n/g, '')));

    document.getElementById('authSection').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    renderDashboard();
  } catch(e) {
    var msg = document.getElementById('authMsg');
    msg.className = 'status-msg status-error';
    msg.textContent = '오류: ' + e.message;
    msg.classList.remove('hidden');
  }
}

async function saveUsers() {
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(usersData, null, 2))));
  var res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + FILE_PATH, {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: '구독자 업데이트', content: content, sha: fileSha })
  });
  if (!res.ok) throw new Error('저장 실패');
  var result = await res.json();
  fileSha = result.content.sha;
}

function renderDashboard() {
  var subs = usersData.subscribers || [];
  var monthly = subs.filter(function(u) { return u.plan === 'monthly'; }).length;
  var purchase = subs.filter(function(u) { return u.plan === 'purchase'; }).length;

  document.getElementById('statTotal').textContent = subs.length;
  document.getElementById('statMonthly').textContent = monthly;
  document.getElementById('statPurchase').textContent = purchase;

  var list = document.getElementById('userList');
  if (subs.length === 0) {
    list.innerHTML = '<div class="empty-msg">등록된 구독자가 없습니다</div>';
    return;
  }

  list.innerHTML = '';
  subs.forEach(function(user, idx) {
    var item = document.createElement('div');
    item.className = 'user-item';
    var planLabel = user.plan === 'monthly' ? '월구독' : '프로그램구입';
    var planClass = user.plan === 'monthly' ? 'plan-monthly' : 'plan-purchase';
    item.innerHTML =
      '<div style="flex:1;min-width:0;">' +
        '<div class="user-email">' + user.email + '</div>' +
        '<div class="user-date">등록: ' + (user.date || '-') + '</div>' +
      '</div>' +
      '<span class="user-plan ' + planClass + '">' + planLabel + '</span>' +
      '<button class="btn btn-danger" onclick="removeUser(' + idx + ')">삭제</button>';
    list.appendChild(item);
  });
}

async function addUser() {
  var email = document.getElementById('addEmail').value.trim().toLowerCase();
  var plan = document.getElementById('addPlan').value;
  var msg = document.getElementById('addMsg');

  if (!email || !email.includes('@')) {
    msg.className = 'status-msg status-error'; msg.textContent = '올바른 이메일을 입력해주세요.';
    msg.classList.remove('hidden'); return;
  }

  var exists = usersData.subscribers.some(function(u) { return u.email === email; });
  if (exists) {
    msg.className = 'status-msg status-error'; msg.textContent = '이미 등록된 이메일입니다.';
    msg.classList.remove('hidden'); return;
  }

  var today = new Date().toISOString().split('T')[0];
  usersData.subscribers.push({ email: email, plan: plan, date: today });

  try {
    msg.className = 'status-msg'; msg.textContent = '저장 중...'; msg.classList.remove('hidden');
    await saveUsers();
    msg.className = 'status-msg status-success'; msg.textContent = '✅ ' + email + ' 추가 완료!';
    document.getElementById('addEmail').value = '';
    renderDashboard();
  } catch(e) {
    msg.className = 'status-msg status-error'; msg.textContent = '저장 실패: ' + e.message;
  }
}

async function removeUser(idx) {
  var user = usersData.subscribers[idx];
  if (!confirm(user.email + ' 구독을 삭제하시겠습니까?')) return;

  usersData.subscribers.splice(idx, 1);
  try {
    await saveUsers();
    renderDashboard();
  } catch(e) {
    alert('삭제 실패: ' + e.message);
    await loadUsers();
  }
}
</script>
</body>
</html>
