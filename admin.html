<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매트허브 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#f5f5f0;min-height:100vh;}
.admin-header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px;text-align:center;}
.admin-header h1{color:#fff;font-size:20px;font-weight:700;}
.admin-header span{color:#7eb8da;font-size:12px;}
.container{max-width:600px;margin:0 auto;padding:16px;}
.auth-box{background:#fff;border-radius:12px;padding:32px 24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-align:center;}
.auth-box h2{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:20px;}
.auth-field{margin-bottom:14px;text-align:left;max-width:300px;margin-left:auto;margin-right:auto;}
.auth-field label{font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;}
.auth-field input{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;text-align:center;outline:none;}
.auth-field input:focus{border-color:#2563eb;}
.auth-field .note{font-size:10px;color:#aaa;margin-top:4px;}
.auth-btn{width:100%;max-width:300px;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.pw-error{color:#e74c3c;font-size:13px;margin-top:12px;display:none;}
.panel{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.panel-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f0f0f0;}
.stat-row{display:flex;gap:12px;margin-bottom:16px;}
.stat-card{flex:1;background:#f8f8f5;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;color:#1a1a2e;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}
.add-form{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.add-form input{flex:1;min-width:0;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;outline:none;}
.add-form input:focus{border-color:#2563eb;}
.add-form select{padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:#fff;}
.btn-add{width:100%;padding:12px;border-radius:8px;border:none;background:#27ae60;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.btn-add:active{filter:brightness(0.9);}
.btn-danger{padding:8px 14px;border-radius:6px;border:none;background:#e74c3c;color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
.user-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #f0f0f0;gap:8px;}
.user-item:last-child{border-bottom:none;}
.user-email{font-size:13px;font-weight:600;color:#333;flex:1;word-break:break-all;}
.user-plan{font-size:11px;padding:3px 8px;border-radius:12px;font-weight:600;white-space:nowrap;}
.plan-monthly{background:#e8f4fd;color:#2563eb;}
.plan-purchase{background:#fdf0ef;color:#e74c3c;}
.user-date{font-size:10px;color:#999;}
.empty-msg{text-align:center;padding:32px;color:#aaa;font-size:14px;}
.status-msg{padding:10px;border-radius:8px;margin:8px 0;font-size:13px;text-align:center;}
.status-success{background:#edfff4;color:#27ae60;}
.status-error{background:#fdf0ef;color:#e74c3c;}
.hidden{display:none!important;}
.logout-area{text-align:center;margin-top:16px;}
.logout-area span{color:#2563eb;font-size:12px;cursor:pointer;margin:0 10px;}
</style>
</head>
<body>

<div class="admin-header">
  <span>MATHUB ADMIN</span>
  <h1>매트허브 관리자</h1>
</div>

<div class="container">
  <div id="authSection" class="auth-box">
    <h2>🔐 관리자 인증</h2>
    <div class="auth-field">
      <label>비밀번호</label>
      <input type="password" id="pwInput" placeholder="••••••" inputmode="numeric" maxlength="10">
    </div>
    <div id="tokenField" class="auth-field hidden"></div>
    <button class="auth-btn" onclick="adminLogin()">로그인</button>
    <div id="pwError" class="pw-error"></div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="panel">
      <div class="panel-title">📊 현황</div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">전체 구독자</div></div>
        <div class="stat-card"><div class="stat-num" id="statMonthly">0</div><div class="stat-label">월구독</div></div>
        <div class="stat-card"><div class="stat-num" id="statPurchase">0</div><div class="stat-label">프로그램구입</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">➕ 구독자 추가</div>
      <div class="add-form">
        <input type="email" id="addEmail" placeholder="이메일 (Google 로그인 이메일)">
        <select id="addPlan"><option value="monthly">월구독</option><option value="purchase">프로그램구입</option></select>
      </div>
      <button class="btn-add" onclick="addUser()">구독자 추가</button>
      <div id="addMsg"></div>
    </div>

    <div class="panel">
      <div class="panel-title">👥 구독자 목록</div>
      <div id="userList"><div class="empty-msg">로딩 중...</div></div>
    </div>

    <div class="logout-area">
      <span onclick="adminLogout()">← 로그아웃</span>
    </div>
  </div>
</div>

<script>
var REPO = 'kinpds-max/matcel';
var FILE_PATH = 'users.json';
var ADMIN_PW = '471500';
var ghToken = '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';
var usersData = null;
var fileSha = '';

(function() {})();

document.getElementById('pwInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') adminLogin(); });

function adminLogin() {
  var pw = document.getElementById('pwInput').value.trim();
  var errEl = document.getElementById('pwError');
  if (pw !== ADMIN_PW) { errEl.textContent = '비밀번호가 틀립니다.'; errEl.style.display = 'block'; return; }
  document.getElementById('authSection').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  loadUsers();
}

function adminLogout() {
  document.getElementById('authSection').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').style.display = 'none';
}

async function loadUsers() {
  try {
    var res = await fetch('https://raw.githubusercontent.com/' + REPO + '/main/' + FILE_PATH + '?t=' + Date.now());
    usersData = await res.json();
    renderDashboard();
  } catch(e) { document.getElementById('userList').innerHTML = '<div class="empty-msg">로드 실패</div>'; }
}

async function getFileSha() {
  var res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE_PATH, {
    headers: { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error('인증 실패. 토큰을 재설정해주세요.');
  fileSha = (await res.json()).sha;
}

async function saveUsers() {
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(usersData, null, 2))));
  var res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE_PATH, {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: '구독자 업데이트', content: content, sha: fileSha })
  });
  if (!res.ok) throw new Error('저장 실패');
  fileSha = (await res.json()).content.sha;
}

function renderDashboard() {
  var subs = usersData.subscribers || [];
  document.getElementById('statTotal').textContent = subs.length;
  document.getElementById('statMonthly').textContent = subs.filter(function(u) { return u.plan === 'monthly'; }).length;
  document.getElementById('statPurchase').textContent = subs.filter(function(u) { return u.plan === 'purchase'; }).length;
  var list = document.getElementById('userList');
  if (!subs.length) { list.innerHTML = '<div class="empty-msg">등록된 구독자가 없습니다</div>'; return; }
  list.innerHTML = '';
  subs.forEach(function(user, idx) {
    var item = document.createElement('div'); item.className = 'user-item';
    item.innerHTML = '<div style="flex:1;min-width:0;"><div class="user-email">' + user.email + '</div><div class="user-date">등록: ' + (user.date || '-') + '</div></div><span class="user-plan ' + (user.plan === 'monthly' ? 'plan-monthly' : 'plan-purchase') + '">' + (user.plan === 'monthly' ? '월구독' : '프로그램구입') + '</span><button class="btn-danger" onclick="removeUser(' + idx + ')">삭제</button>';
    list.appendChild(item);
  });
}

async function addUser() {
  var email = document.getElementById('addEmail').value.trim().toLowerCase();
  var plan = document.getElementById('addPlan').value;
  var msg = document.getElementById('addMsg');
  if (!email || !email.includes('@')) { msg.innerHTML = '<div class="status-msg status-error">올바른 이메일을 입력해주세요.</div>'; return; }
  if (usersData.subscribers.some(function(u) { return u.email === email; })) { msg.innerHTML = '<div class="status-msg status-error">이미 등록된 이메일입니다.</div>'; return; }
  usersData.subscribers.push({ email: email, plan: plan, date: new Date().toISOString().split('T')[0] });
  try {
    msg.innerHTML = '<div class="status-msg">저장 중...</div>';
    await getFileSha(); await saveUsers();
    msg.innerHTML = '<div class="status-msg status-success">✅ ' + email + ' 추가!</div>';
    document.getElementById('addEmail').value = '';
    renderDashboard();
  } catch(e) { usersData.subscribers.pop(); msg.innerHTML = '<div class="status-msg status-error">' + e.message + '</div>'; }
}

async function removeUser(idx) {
  var user = usersData.subscribers[idx];
  if (!confirm(user.email + ' 삭제?')) return;
  var removed = usersData.subscribers.splice(idx, 1)[0];
  try { await getFileSha(); await saveUsers(); renderDashboard(); }
  catch(e) { usersData.subscribers.splice(idx, 0, removed); alert(e.message); renderDashboard(); }
}
</script>
</body>
</html>
